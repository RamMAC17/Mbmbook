services:
  # ──── MBM Book (Backend + Frontend) ────
  mbmbook:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "9999:9999"
    environment:
      MBM_HOST: "0.0.0.0"
      MBM_PORT: "9999"
      MBM_HOST_IP: "${MBM_HOST_IP:-0.0.0.0}"
      MBM_DATABASE_URL: "sqlite+aiosqlite:///data/mbmbook.db"
      MBM_DEBUG: "false"
      MBM_DOCKER_NETWORK: "mbmbook-net"
      MBM_KERNEL_IMAGE_PREFIX: "mbmbook-kernel"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mbmbook-net
      - default
    restart: unless-stopped

networks:
  mbmbook-net:
    driver: bridge
    name: mbmbook-net
