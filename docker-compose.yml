services:
  # ──── MBM Book (Backend + Frontend) ────
  mbmbook:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "9999:9999"
    environment:
      MBM_HOST: "0.0.0.0"
      MBM_PORT: "9999"
      MBM_HOST_IP: "${MBM_HOST_IP:-0.0.0.0}"
      MBM_HOST_DATA_DIR: "${MBM_HOST_DATA_DIR:-d:/Book/Mbmbook/data}"
      MBM_DATABASE_URL: "sqlite+aiosqlite:///data/mbmbook.db"
      MBM_DEBUG: "false"
      MBM_DOCKER_NETWORK: "mbmbook-net"
      MBM_KERNEL_IMAGE_PREFIX: "mbmbook-kernel"
      MBM_MAX_KERNELS_PER_NODE: "${MBM_MAX_KERNELS_PER_NODE:-40}"
      MBM_DEFAULT_CPU_LIMIT: "${MBM_DEFAULT_CPU_LIMIT:-0.5}"
      MBM_DEFAULT_MEMORY_LIMIT: "${MBM_DEFAULT_MEMORY_LIMIT:-1g}"
      MBM_SHARE_ADMIN_PASSWORD: "${MBM_SHARE_ADMIN_PASSWORD:-change-me-share-password}"
      MBM_SHARED_FOLDER_PATH: "${MBM_SHARED_FOLDER_PATH:-}"
      MBM_HOST_SHARE_ROOT: "${MBM_HOST_SHARE_ROOT:-d:/}"
      MBM_HOST_SHARE_MOUNT: "${MBM_HOST_SHARE_MOUNT:-/hostfs}"
      MBM_STORAGE_CLEANUP_INTERVAL_SECONDS: "${MBM_STORAGE_CLEANUP_INTERVAL_SECONDS:-900}"
      MBM_STORAGE_STALE_HOURS: "${MBM_STORAGE_STALE_HOURS:-24}"
      MBM_PYTHON_STATE_HISTORY_LIMIT: "${MBM_PYTHON_STATE_HISTORY_LIMIT:-200}"
    volumes:
      - ./data:/app/data
      - ${MBM_HOST_SHARE_ROOT:-d:/}:${MBM_HOST_SHARE_MOUNT:-/hostfs}:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mbmbook-net
      - default
    restart: unless-stopped

networks:
  mbmbook-net:
    driver: bridge
    name: mbmbook-net
